name: Bug report
description: Report a reproducible Marvin bug.
title: "Bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: List the commands and inputs needed to reproduce the issue.
      placeholder: |
        1. Run `marvin analyze ...`
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: input
    attributes:
      label: Input Details
      description: Describe the exported Cost Explorer CSV shape, headers, date range, and any config used. Do not paste sensitive billing data.
      placeholder: |
        CSV headers:
        Config:
        Date range:
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Output
      description: Paste the relevant terminal output or report snippet.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - CSV parsing
        - Analysis totals or warnings
        - Report formatting
        - Config loading
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, shell, Go version, and Marvin version or commit.
    validations:
      required: true
