name: Bug report
description: Report a reproducible Marvin bug.
title: "Bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: List the commands and inputs needed to reproduce the issue.
      placeholder: |
        1. Run `marvin analyze ...`
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Go version, and Marvin version or commit.
    validations:
      required: true
